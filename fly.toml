app = "fortichain-api"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"
  GENLAYER_RPC_URL = "https://studio.genlayer.com/api"
  GENLAYER_CONTRACT_ADDRESS = "0xAbf8a0A08C73Faa30bA8717DDffb9328331Fec07"
  EMAIL_FROM = "preciousmofeoluwa@gmail.com"
  BCRYPT_ROUNDS = "12"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
