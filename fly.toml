app = "fortichain-api"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"

[deploy]
  release_command = "/bin/sh -c 'cd /app && node_modules/.bin/tsx src/db/migrate.ts'"

[env]
  PORT = "3001"
  NODE_ENV = "production"
  GENLAYER_RPC_URL = "https://studio.genlayer.com/api"
  GENLAYER_CONTRACT_ADDRESS = "0xAbf8a0A08C73Faa30bA8717DDffb9328331Fec07"
  EMAIL_FROM = "preciousmofeoluwa@gmail.com"
  BCRYPT_ROUNDS = "10"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2

  [[http_service.checks]]
    grace_period = "180s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
