

services:
  postgres:
    image: postgres:16-alpine
    container_name: fortichain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fortichain
      POSTGRES_PASSWORD: fortichain_secret
      POSTGRES_DB: fortichain
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortichain"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fortichain_redis
    restart: unless-stopped
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
